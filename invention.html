```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#1f4037,#99f2c8);display:flex;justify-content:center;align-items:center;min-height:100vh;}
.page{display:none;}
.page.active{display:block;}
.card{background:white;width:380px;padding:30px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);text-align:center;}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1f4037;color:white;font-weight:bold;cursor:pointer;}
button:hover{background:#16322c;}
.mode-btns{display:flex; gap:5px;}
.mode-btns button{flex:1;background:#ddd;color:#333;}
.mode-btns .active{background:#1f4037;color:white;}
.timer-display{font-size:3rem;margin:20px 0;font-weight:bold;}
.progress-bar{width:100%;height:10px;background:#eee;border-radius:10px;overflow:hidden;}
.progress{height:100%;width:0%;background:#2e86de;}
.option-btn{background:#eee;color:#333;margin-top:8px;}
.option-btn:hover{background:#ddd;}
.correct{background:#2ecc71 !important;color:white;}
.wrong{background:#e74c3c !important;color:white;}
#liveScore{margin:10px 0;font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="page active" id="loginPage">
    <div class="card">
        <h2>STUDENT LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <p id="errorMsg" style="color:red;display:none;">Invalid Login</p>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- TIMER -->
<div class="page" id="pomodoroPage">
    <div class="card">
        <h2>Study Timer</h2>

        <div class="mode-btns">
            <button id="studyMode" class="active" onclick="setMode('study')">Study</button>
            <button id="breakMode" onclick="setMode('break')">Break</button>
        </div>

        <div class="timer-display" id="timeDisplay">25:00</div>

        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
        <button onclick="showPage('quizPage')">AI Quiz</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- QUIZ -->
<div class="page" id="quizPage">
    <div class="card">
        <h2>Smart AI Quiz (1–25)</h2>

        <input type="file" id="fileInput" accept=".txt">
        <button onclick="loadFile()">Upload File</button>

        <textarea id="quiz-input" placeholder="Paste your notes here..."></textarea>
        <button onclick="generateAIQuiz()">Generate Quiz</button>

        <div id="quiz-box" style="display:none;">
            <p id="liveScore">Score: 0</p>
            <h3 id="questionText"></h3>

            <!-- MCQ -->
            <div id="mcqBox">
                <button class="option-btn" onclick="selectAIAnswer('A')" id="optA"></button>
                <button class="option-btn" onclick="selectAIAnswer('B')" id="optB"></button>
                <button class="option-btn" onclick="selectAIAnswer('C')" id="optC"></button>
                <button class="option-btn" onclick="selectAIAnswer('D')" id="optD"></button>
            </div>

            <!-- IDENTIFICATION -->
            <div id="idBox" style="display:none;">
                <input type="text" id="idAnswer" placeholder="Type your answer here">
                <button onclick="submitIdentification()">Submit</button>
            </div>
        </div>

        <div id="quiz-result" style="display:none;">
            <h3>Quiz Finished!</h3>
            <p id="scoreText"></p>
            <button onclick="restartQuiz()">Try Again</button>
        </div>

        <button onclick="showPage('pomodoroPage')">Back</button>
    </div>
</div>

<audio id="alarmSound">
<source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<script>

// LOGIN
function login(){
    if(username.value==="BSIT1D" && password.value==="123456"){
        showPage('pomodoroPage');
        errorMsg.style.display="none";
    }else errorMsg.style.display="block";
}
function logout(){showPage('loginPage');}

// PAGE SWITCH
function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// TIMER
let timer,timeLeft,running=false;
const study=25*60, brk=5*60;
let mode='study';

function setMode(m){
    mode=m;
    studyMode.classList.toggle('active',m==='study');
    breakMode.classList.toggle('active',m==='break');
    resetTimer();
}
function startTimer(){
    if(running) return;
    running=true;
    timer=setInterval(()=>{
        if(timeLeft<=0){
            clearInterval(timer);
            running=false;
            alarmSound.play();
            alert("Time's up!");
            return;
        }
        timeLeft--;
        updateDisplay();
    },1000);
}
function pauseTimer(){clearInterval(timer); running=false;}
function resetTimer(){
    clearInterval(timer);
    running=false;
    timeLeft=mode==='study'?study:brk;
    updateDisplay();
}
function updateDisplay(){
    let m=Math.floor(timeLeft/60), s=timeLeft%60;
    timeDisplay.textContent=`${m}:${s<10?'0'+s:s}`;
    let total=mode==='study'?study:brk;
    progressBar.style.width=((total-timeLeft)/total*100)+'%';
}
resetTimer();

// FILE UPLOAD
function loadFile(){
    const file = document.getElementById("fileInput").files[0];
    if(!file){ alert("Select a file!"); return; }

    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById("quiz-input").value = e.target.result;
    };
    reader.readAsText(file);
}

// SMART KEYWORD EXTRACTION
function extractKeyword(sentence){
    const stopwords = [
        "the","is","are","was","were","of","in","on","at","to","for","with",
        "a","an","and","or","by","from","as","that","this","it","be","has","have"
    ];

    let words = sentence
        .toLowerCase()
        .replace(/[^a-zA-Z0-9 ]/g,"")
        .split(" ")
        .filter(w => w.length > 3 && !stopwords.includes(w));

    if(words.length === 0){
        return sentence.split(" ")[0];
    }

    words.sort((a,b)=>b.length - a.length);
    return words[0];
}

// QUIZ LOGIC
let quiz=[], qIndex=0, score=0;

function generateAIQuiz(){
    let notes=document.getElementById('quiz-input').value.trim();

    if(!notes){
        alert("Paste or upload notes!");
        return;
    }

    let sentences = notes
        .split(/[.!?]/)
        .map(s=>s.trim())
        .filter(s=>s.length>10);

    quiz=[];

    for(let i=0;i<25;i++){
        let s = sentences[i % sentences.length];

        if(i%2===0){
            // MCQ
            let wrong1="Incorrect: "+s;
            let wrong2=s.split(" ").reverse().join(" ");
            let wrong3="Not related";

            let options=shuffle([s,wrong1,wrong2,wrong3]);
            let correctIndex=options.indexOf(s);

            quiz.push({
                type:"mcq",
                question:`(${i+1}) Which is correct?`,
                options:options,
                correct:["A","B","C","D"][correctIndex]
            });

        }else{
            // IDENTIFICATION (SMART)
            let keyword=extractKeyword(s);
            let blanked=s.replace(new RegExp(keyword,"i"),"_____");

            quiz.push({
                type:"id",
                question:`(${i+1}) Identify the missing term:\n${blanked}`,
                answer:keyword.toLowerCase()
            });
        }
    }

    qIndex=0;
    score=0;

    document.getElementById('quiz-box').style.display='block';
    document.getElementById('quiz-result').style.display='none';

    loadAIQ();
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function loadAIQ(){
    let q=quiz[qIndex];
    questionText.textContent=q.question;

    if(q.type==="mcq"){
        mcqBox.style.display="block";
        idBox.style.display="none";

        optA.textContent="A. "+q.options[0];
        optB.textContent="B. "+q.options[1];
        optC.textContent="C. "+q.options[2];
        optD.textContent="D. "+q.options[3];

    }else{
        mcqBox.style.display="none";
        idBox.style.display="block";
        idAnswer.value="";
    }

    liveScore.textContent=`Score: ${score}/25`;
}

function selectAIAnswer(ans){
    let q=quiz[qIndex];
    let sel={A:0,B:1,C:2,D:3}[ans];
    let corr={A:0,B:1,C:2,D:3}[q.correct];

    if(sel===corr){score++;}
    nextQuestion();
}

function submitIdentification(){
    let user=idAnswer.value.trim().toLowerCase();
    let correct=quiz[qIndex].answer;

    if(user===correct){score++;}
    else alert("Correct answer: "+correct);

    nextQuestion();
}

function nextQuestion(){
    qIndex++;
    if(qIndex<quiz.length) loadAIQ();
    else showAIResult();
}

function showAIResult(){
    document.getElementById('quiz-box').style.display='none';
    document.getElementById('quiz-result').style.display='block';

    let percent=Math.round((score/25)*100);
    scoreText.innerHTML=`Score: ${score}/25<br>Accuracy: ${percent}%`;
}

function restartQuiz(){
    document.getElementById('quiz-result').style.display='none';
}

</script>
</body>
</html>
